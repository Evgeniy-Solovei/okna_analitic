<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Войти в дашборд</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #6a7485;
      --line: #dbe3ef;
      --accent: #2f80ed;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .login {
      width: min(420px, 100%);
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 44px rgba(23, 32, 51, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .hint {
      margin: 8px 0 26px;
      color: var(--muted);
      font-size: 14px;
    }

    .error {
      margin-bottom: 18px;
      padding: 10px 12px;
      border: 1px solid #f3b8b2;
      border-radius: 6px;
      color: var(--danger);
      background: #fff4f2;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      height: 42px;
      margin-bottom: 16px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
    }

    input:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(47, 128, 237, 0.16);
    }

    button {
      width: 100%;
      height: 42px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="login">
    <h1>Войти в дашборд Панорама</h1>
    <p class="hint">Доступ к аналитике эффективности менеджеров</p>

    {% if form.errors %}
      <div class="error">Неверный логин или пароль.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="{{ form.username.id_for_label }}">Логин</label>
      {{ form.username }}
      <label for="{{ form.password.id_for_label }}">Пароль</label>
      {{ form.password }}
      <button type="submit">Войти</button>
    </form>
  </main>
</body>
</html>
