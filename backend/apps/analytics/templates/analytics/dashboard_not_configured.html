<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Дашборд не настроен</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #172033;
    }

    .panel {
      width: min(520px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #fff;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #596579;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <section class="panel">
    <h1>Дашборд не настроен</h1>
    <p>{{ message }}</p>
  </section>
</body>
</html>
